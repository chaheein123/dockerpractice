version: '3'
services:
  postgres:
    image: 'postgres:latest'
    mem_limit: 512m
    environment:
      - POSTGRES_PASSWORD=postgres_password
  redis:
    image: 'redis:latest'
    mem_limit: 128m
  client:
    image: ${DOCKER_HUB_USERNAME}/dp-aws-nginx:${SHA}
    mem_limit: 128m
    hostname: client
  server:
    image: ${DOCKER_HUB_USERNAME}/dp-aws-server:${SHA}
    mem_limit: 128m
    hostname: api
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
      - PGUSER=$PGUSER
      - PGHOST=$PGHOST
      - PGDATABASE=$PGDATABASE
      - PGPASSWORD=$PGPASSWORD
      - PGPORT=$PGPORT
  worker:
    image: ${DOCKER_HUB_USERNAME}/dp-aws-worker:${SHA}
    mem_limit: 128m
    hostname: worker
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
  nginx:
    image: ${DOCKER_HUB_USERNAME}/dp-aws-nginx:${SHA}
    mem_limit: 128m
    hostname: nginx
    ports:
      - '80:80'
